<mat-card class="card">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title>Radio Button Demo</mat-card-title>
    <mat-card-subtitle
      >Radio Button component using material ui</mat-card-subtitle
    >
  </mat-card-header>
  <mat-card-content>
    <label>Residence Type</label>
    <mat-radio-group class="custom-radio-group" [value]="residenceType">
      @for (item of radioOptions; track $index) {
        <mat-radio-button
          name="ResidencyType"
          class="custom-radio"
          [value]="item.value"
          (click)="toggleResidenceType(item.value)"
        >
          {{ item.viewValue }}
        </mat-radio-button>
      }
    </mat-radio-group>
    @if (residenceType) {
      <p class="selectedvalue">Your Residence Type is: {{ residenceType }}</p>
    }

    <div class="sheet-content">
      <h3>iPhone Style Bottom Sheet</h3>
      <p>This slides from bottom</p>
      <button mat-raised-button color="primary">Confirm</button>
    </div>
    <button mat-raised-button color="accent" (click)="openSheet()">
  Open Bottom Sheet
</button>
  </mat-card-content>
</mat-card>
