<div class="footer-container">
  <div class="footer-section flex-column">
    <div id="links-section" class="links">
      @for (link of links; track link) {
        <span>
          <a
            href="{{ link.url }}"
            class="bold"
            target="_blank"
            rel="noopener noreferrer"
            >{{ link.key }}</a
            >
          </span>
        }
      </div>
      <div [id]="footerId">
        @if (DynamicContent$ | async; as content) {
          <div [innerHTML]="content"></div>
        }
      </div>
    </div>
  </div>
