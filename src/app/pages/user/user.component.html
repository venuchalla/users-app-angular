<p>User Login</p>
<app-userlogin></app-userlogin>
@if (false) {
  <div>
    @if (!showIframe) {
      <button (click)="openIframe()">Sign In</button>
    }
    @if (showIframe) {
      <button (click)="closeIframe()">Close Iframe</button>
    }
    @if (showIframe) {
      <iframe [src]="trustedUrl" WIDTH = '90%' HEIGHT= '800' >
      </iframe>
    }
  </div>
}
